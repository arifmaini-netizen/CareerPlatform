<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospitality IT | Career Management Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div class="min-h-screen flex">
        <!-- Sidebar -->
        <aside class="w-64 bg-slate-900 text-white p-6 hidden md:flex flex-col fixed h-full">
            <div class="text-2xl font-bold mb-10 flex items-center gap-2 text-indigo-400">
                <i data-lucide="server"></i> HospitalityIT
            </div>
            <nav class="space-y-4 flex-grow">
                <button onclick="showTab('dashboard')" class="w-full text-left p-3 rounded-lg hover:bg-slate-800 flex items-center gap-3"><i data-lucide="layout-dashboard"></i> Dashboard</button>
                <button onclick="showTab('job-finder')" class="w-full text-left p-3 rounded-lg hover:bg-slate-800 flex items-center gap-3"><i data-lucide="search"></i> AI Job Finder</button>
                <button onclick="showTab('ats-analyzer')" class="w-full text-left p-3 rounded-lg hover:bg-slate-800 flex items-center gap-3"><i data-lucide="file-text"></i> ATS Analyzer</button>
                <button onclick="showTab('applications')" class="w-full text-left p-3 rounded-lg hover:bg-slate-800 flex items-center gap-3"><i data-lucide="briefcase"></i> Applications</button>
                <button onclick="showTab('career')" class="w-full text-left p-3 rounded-lg hover:bg-slate-800 flex items-center gap-3"><i data-lucide="graduation-cap"></i> Career Dev</button>
            </nav>
            <div class="border-t border-slate-700 pt-6">
                <p class="text-xs text-slate-400 mb-2">Gemini API Status</p>
                <div id="api-status-indicator" class="flex items-center gap-2 text-slate-500">
                    <i id="status-icon" data-lucide="alert-circle"></i> <span id="status-text">Not Configured</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 md:ml-64 p-8">
            <header class="flex justify-between items-center mb-8">
                <h1 class="text-2xl font-bold">Welcome Back, Senior IT Manager</h1>
            </header>

            <div id="dashboard" class="tab-content active space-y-6">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                    <h2 class="text-lg font-bold mb-4">AI Configuration</h2>
                    <div class="flex gap-4">
                        <input type="password" id="api-key-input" placeholder="Enter Gemini API Key" class="flex-1 p-3 border rounded-lg">
                        <button onclick="testGeminiConnection()" class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-medium hover:bg-indigo-700">Verify Key</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
        }

        async function updateStatusUI(iconName, text, colorClass) {
            const statusText = document.getElementById('status-text');
            const statusIcon = document.getElementById('status-icon');
            const indicator = document.getElementById('api-status-indicator');

            statusText.innerText = text;
            indicator.className = `flex items-center gap-2 ${colorClass}`;
            
            // Swap icon
            statusIcon.setAttribute('data-lucide', iconName);
            
            // Re-initialize Lucide to update the DOM
            lucide.createIcons();
        }

        async function testGeminiConnection() {
            const key = document.getElementById('api-key-input').value;
            if (!key) return alert("Please enter a key.");

            updateStatusUI('loader', 'Verifying...', 'text-yellow-500');
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "ping" }] }] })
                });

                if (response.ok) {
                    updateStatusUI('check-circle', 'Connected', 'text-emerald-500');
                } else {
                    updateStatusUI('x-circle', 'Invalid Key', 'text-red-500');
                }
            } catch (err) {
                updateStatusUI('x-circle', 'Connection Error', 'text-red-500');
            }
        }
        
        lucide.createIcons();
    </script>
</body>
</html>
